<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN X NAIM LIVE 🔴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;font-family:'Inter','Roboto Mono',sans-serif;background:#02090c;color:#fff;}
.header{text-align:center;padding:18px;font-size:28px;color:#ffdd00;text-shadow:0 0 15px #ffdd00;}
#listPage{max-width:520px;margin:auto;padding:10px;}
.match-card{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(135deg,#ff004c,#ffb300,#00e5ff,#ff004c);background-size:300% 300%;animation:rgb 6s linear infinite;border-radius:18px;padding:12px 16px;margin:14px 0;cursor:pointer;box-shadow:0 0 18px rgba(0,0,0,0.5);transition:0.3s;}
.match-card:hover{transform:scale(1.02);}
.match-info{text-align:center;flex:1;}
.match-info span{display:block;font-weight:600;font-size:18px;}
.flags{display:flex;gap:6px;}
.flags img{width:36px;height:24px;border-radius:4px;}
#playerPage{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:999;overflow:auto;padding:20px;box-sizing:border-box;}
.back{color:#38f2e0;cursor:pointer;font-weight:700;margin-bottom:10px;}
.match-title{text-align:center;font-size:22px;margin:10px 0;color:#ffdd00;display:flex;align-items:center;justify-content:center;gap:10px;}
.player-box{background:#000;border-radius:20px;overflow:hidden;margin:10px 0;}
video{width:100%;height:240px;background:#000;}
.controls{display:flex;gap:10px;padding:12px 0;}
.ctrl{flex:1;padding:12px;border:none;border-radius:14px;font-weight:700;cursor:pointer;}
.play{background:#ff6a00;color:#fff;}
.pip{background:#111;color:#38f2e0;}
.share{background:#0088cc;color:#fff;}
.source-btn{width:100%;padding:12px;margin:6px 0;border:none;border-radius:12px;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#ff004c);background-size:300% 300%;animation:rgb 6s linear infinite;color:#fff;cursor:pointer;font-weight:bold;}
.telegram-float{position:fixed;bottom:20px;right:20px;background:linear-gradient(90deg,#0088cc,#00f2ff);padding:14px 20px;color:#fff;font-weight:700;border-radius:26px;text-decoration:none;text-align:center;box-shadow:0 0 25px rgba(0,255,255,.5);z-index:9999;animation:pulse 2s infinite;}
@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 25px rgba(0,255,255,.5);}50%{transform:scale(1.05);box-shadow:0 0 40px rgba(0,255,255,.8);}100%{transform:scale(1);box-shadow:0 0 25px rgba(0,255,255,.5);}}
@keyframes rgb{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
</style>
</head>
<body>

<div class="header">MN X NAIM LIVE 🔴</div>
<div id="listPage"></div>

<div id="playerPage">
  <div class="back" onclick="goBack()">← Back</div>
  <div class="match-title" id="matchName"><span></span></div>
  <div class="flags" id="matchFlags"></div>
  <div class="player-box">
    <video id="video" controls playsinline></video>
  </div>
  <div id="sources"></div>
  <div class="controls">
    <button class="ctrl play" onclick="video.play()">▶ PLAY</button>
    <button class="ctrl pip" onclick="pip()">⧉ PiP</button>
    <button class="ctrl share" onclick="share()">↗ SHARE</button>
  </div>
</div>

<a href="https://t.me/+EUu_2FFLJsdmMGU9" target="_blank" class="telegram-float">Join Telegram</a>

<script>
let hls;
const video=document.getElementById("video");
let currentSource="";

/* MATCH DATA 5 SLOTS, 4 VERSIONS */
const matches=[
  {name:"BD vs IND","time":"08:00 PM",flags:["https://flagcdn.com/w80/bd.png","https://flagcdn.com/w80/in.png"],sources:[
    {name:"TNT", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"},
    {name:"FanCode", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"},
    {name:"SonyLiv", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"},
    {name:"CRICFy", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"}
  ]},
  {name:"SA vs WI","time":"10:00 PM",flags:["https://flagcdn.com/w80/sa.png","https://flagcdn.com/w80/wi.png"],sources:[

    {name:"FanCode", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"},
    {name:"SonyLiv", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"},
    {name:"CRICFy", link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303627"}
  ]},
  {name:"NZ vs PAK","time":"02:00 PM",flags:["https://flagcdn.com/w80/nz.png","https://flagcdn.com/w80/pk.png"],sources:[

  ]}
];

const list=document.getElementById("listPage");
matches.forEach(m=>{
  const card=document.createElement("div");
  card.className="match-card";
  card.innerHTML=`<div class="flags"><img src="${m.flags[0]}"><img src="${m.flags[1]}"></div>
  <div class="match-info"><span>${m.name}</span><span>${m.time}</span></div>`;
  card.onclick=()=>openMatch(m);
  list.appendChild(card);
});

function openMatch(m){
  document.getElementById("listPage").style.display="none";
  document.getElementById("playerPage").style.display="block";
  document.getElementById("matchName").children[0].innerText=m.name + " | " + m.time;

  const flagsDiv=document.getElementById("matchFlags");
  flagsDiv.innerHTML="";
  m.flags.forEach(f=>{const img=document.createElement("img");img.src=f;flagsDiv.appendChild(img);});

  const sourcesDiv=document.getElementById("sources");
  sourcesDiv.innerHTML="";
  m.sources.forEach(s=>{
    const btn=document.createElement("button");
    btn.className='source-btn';
    btn.innerText=s.name;
    btn.onclick=()=>loadSource(s.link);
    sourcesDiv.appendChild(btn);
  });
  loadSource(m.sources[0].link);
}

function loadSource(link){
  if(hls) hls.destroy();
  if(Hls.isSupported()){
    hls=new Hls();
    hls.loadSource(link);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
  }else{video.src=link;video.play();}
}

function goBack(){video.pause();document.getElementById("playerPage").style.display="none";document.getElementById("listPage").style.display="block";}
function pip(){document.pictureInPictureElement?document.exitPictureInPicture():video.requestPictureInPicture();}
function share(){const text=`🔴 LIVE MATCH WATCH NOW: ${document.getElementById('matchName').children[0].innerText}\nJoin 👉 https://t.me/+EUu_2FFLJsdmMGU9`;navigator.share?navigator.share({text}):alert(text);}
</script>
</body>
</html>
