<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MN X NAIM LIVE 🔴</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body{margin:0;font-family:'Inter','Roboto Mono',sans-serif;background:#02090c;color:#fff;}
.header{text-align:center;padding:22px;font-size:34px;font-weight:700;color:#ffdd00;text-shadow:0 0 20px #ffdd00;}
#listPage{max-width:620px;margin:auto;padding:12px;}
.match-card{display:flex;align-items:center;justify-content:space-between;padding:18px;margin:16px 0;border-radius:24px;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);box-shadow:0 0 25px rgba(0,0,0,.6);cursor:pointer;transition:.25s;position:relative;}
.match-card:hover{transform:scale(1.03);}
.flag{width:52px;height:34px;border-radius:6px;}
.match-info{text-align:center;flex:1;}
.match-title{font-size:26px;font-weight:700;}
.match-sub{font-size:16px;color:#ccc;margin-top:4px;}
.badge{position:absolute;top:12px;right:12px;padding:4px 10px;border-radius:12px;font-weight:700;font-size:12px;box-shadow:0 0 10px rgba(0,0,0,.5);}
.live{background:#ff0033;box-shadow:0 0 10px #ff0033;}
.countdown{font-size:13px;margin-top:4px;color:#fff;display:block;text-align:center;}

/* PLAYER OVERLAY */
#playerPage{display:none;position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:999;padding:18px;overflow:auto;}
.back{font-size:18px;color:#38f2e0;cursor:pointer;font-weight:600;margin-bottom:12px;}
.player-title{text-align:center;font-size:28px;font-weight:700;color:#ffdd00;margin:12px 0;}
.player-box{background:#000;border-radius:24px;overflow:hidden;margin:12px 0;}
video{width:100%;height:280px;background:#000;border-radius:12px;}
.source-btn{width:100%;padding:14px;margin:10px 0;border:none;border-radius:16px;font-size:16px;font-weight:700;cursor:pointer;background:linear-gradient(90deg,#ff004c,#ffb300,#00e5ff,#ff004c);background-size:300% 300%;animation:rgb 6s linear infinite;color:#fff;}
.controls{display:flex;gap:10px;margin-top:12px;}
.ctrl{flex:1;padding:14px;border:none;border-radius:16px;font-weight:700;cursor:pointer;}
.play{background:#ff6a00;color:#fff;}
.pip{background:#111;color:#38f2e0;}
.share{background:#0088cc;color:#fff;}
.telegram{position:fixed;bottom:20px;right:20px;padding:16px 24px;background:linear-gradient(90deg,#0088cc,#00f2ff);border-radius:28px;font-weight:700;color:#fff;text-decoration:none;box-shadow:0 0 25px rgba(0,255,255,.6);animation:pulse 2s infinite;font-size:16px;}
@keyframes rgb{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}
@keyframes pulse{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
</style>
</head>
<body>

<div class="header">MN X NAIM LIVE 🔴</div>
<div id="listPage"></div>

<div id="playerPage">
  <div class="back" onclick="goBack()">← Back</div>
  <div class="player-title" id="playerTitle"></div>
  <div class="player-box">
    <video id="video" controls playsinline></video>
  </div>
  <div id="sources"></div>
  <div class="controls">
    <button class="ctrl play" onclick="video.play()">▶ PLAY</button>
    <button class="ctrl pip" onclick="pip()">⧉ PiP</button>
    <button class="ctrl share" onclick="share()">↗ SHARE</button>
  </div>
</div>

<a class="telegram" href="https://t.me/+EUu_2FFLJsdmMGU9" target="_blank">Join Telegram</a>

<script>
let hls;
const video=document.getElementById("video");

const matches=[
{
 title:"RSA VS WI",
 sub:"1st T20• 08:00 PM",

 right:"https://flagcdn.com/w80/za.png",

 sources:[
   {name:"FOX Sports 501",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=197185"},
   {name:"Cricbuzz 1",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=303629"},
   {name:"Super Sports",link:"https://allinonereborn.xyz/vip/live.php?id=778400"},
   {name:"Willow",link:"https://allinonereborn.xyz/vip/live.php?id=778395"}
 ]
},
{
 title:"IND VS NZ",
 sub:"4th T20 • 07:30 PM",
 left:"https://flagcdn.com/w80/in.png",
 right:"https://flagcdn.com/w80/nz.png",
 start:"2026-01-28T19:30:00",
 sources:[
   {name:"FOX 501",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=197185"},
   {name:"Sky Sports Cricket",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=10527"},
   {name:"TNT Sports 1",link:"https://allinonereborn.xyz/vip/live.php?id=1084873"},
   {name:"Willow",link:"https://allinonereborn.xyz/vip/live.php?id=778395"}
 ]
},
{
 title:"AUS VS WI",
 sub:"U19 World Cup • 01:00 PM",
 left:"https://flagcdn.com/w80/au.png",
 right:"https://flagcdn.com/w80/vc.png",
 start:"2026-01-28T13:00:00",
 sources:[
   {name:"FOX 501",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=197185"},
   {name:"Sky Sports Cricket",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=10527"},
   {name:"TNT Sports 1",link:"https://allinonereborn.xyz/vip/live.php?id=1084873"},
   {name:"Willow",link:"https://allinonereborn.xyz/vip/live.php?id=778395"}
 ]
},
{
 title:"BAN W VS TH W",
 sub:"2nd ODI • 09:15 AM",
 left:"https://flagcdn.com/w80/bd.png",
 right:"https://flagcdn.com/w80/th.png",
 start:"2026-01-28T09:15:00",
 sources:[
   {name:"FOX 501",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=197185"},
   {name:"Sky Sports Cricket",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=10527"},

   {name:"Willow",link:"https://allinonereborn.xyz/vip/live.php?id=778395"}
 ]
},
{
 title:"SL VS RSA",
 sub:"U19 WC• 13:00 PM",
 left:"https://flagcdn.com/w80/lk.png",
 right:"https://flagcdn.com/w80/za.png",
 start:"2026-01-29T13:00:00",
 sources:[
   {name:"FOX 501",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=197185"},
   {name:"Sky Sports Cricket",link:"https://allinonereborn.xyz/mix.m3u8/live4.php?id=10527"},
   {name:"TNT Sports 1",link:"https://allinonereborn.xyz/vip/live.php?id=1084873"},
   {name:"Willow",link:"https://allinonereborn.xyz/vip/live.php?id=778395"}
 ]
}
];

const list=document.getElementById("listPage");

matches.forEach(m=>{
 const card=document.createElement("div");
 card.className="match-card";

 const badge=document.createElement("div");
 badge.className="badge";
 card.appendChild(badge);

 card.innerHTML+=`
   <img class="flag" src="${m.left}">
   <div class="match-info">
     <div class="match-title">${m.title}</div>
     <div class="match-sub">${m.sub}</div>
     <span class="countdown">Calculating...</span>
   </div>
   <img class="flag" src="${m.right}">
 `;
 card.onclick=()=>openMatch(m);
 list.appendChild(card);

 const startTime=new Date(m.start);
 const countdownSpan=card.querySelector(".countdown");

 setInterval(()=>{
   const now = new Date();
   let diff = startTime - now;
   if(diff <= 0){
     badge.className="badge live";
     badge.innerText="LIVE NOW";
     countdownSpan.innerText="";
   }else{
     const h=Math.floor(diff/36e5);
     const m2=Math.floor(diff%36e5/6e4);
     countdownSpan.innerText=`Starts in ${h}h ${m2}m`;
   }
 },1000);
});

function openMatch(m){
 document.getElementById("listPage").style.display="none";
 document.getElementById("playerPage").style.display="block";
 document.getElementById("playerTitle").innerText=m.title+" • "+m.sub;

 const s=document.getElementById("sources");
 s.innerHTML="";
 m.sources.forEach(x=>{
  const b=document.createElement("button");
  b.className="source-btn";
  b.innerText=x.name;
  b.onclick=()=>load(x.link);
  s.appendChild(b);
 });
 load(m.sources[0].link);
}

function load(link){
 if(hls)hls.destroy();
 if(Hls.isSupported()){
  hls=new Hls();
  hls.loadSource(link);
  hls.attachMedia(video);
  hls.on(Hls.Events.MANIFEST_PARSED,()=>video.play());
 }else{video.src=link;video.play();}
}

function goBack(){video.pause();document.getElementById("playerPage").style.display="none";document.getElementById("listPage").style.display="block";}
function pip(){document.pictureInPictureElement?document.exitPictureInPicture():video.requestPictureInPicture();}
function share(){navigator.share?navigator.share({text:"🔴 LIVE MATCH WATCH NOW | MN X NAIM"}):alert("🔴 LIVE MATCH WATCH NOW | MN X NAIM");}
</script>

</body>
</html>
